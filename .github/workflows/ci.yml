name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Job set to run
        required: true
        default: all
        type: choice
        options:
          - all
          - fmt
          - clippy
          - test
          - build

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'fmt' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'clippy' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --workspace -- -D warnings

  test:
    name: Test
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'test' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  build:
    name: Build
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'build' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --workspace
